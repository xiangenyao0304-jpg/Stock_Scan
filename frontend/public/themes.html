const grid = document.getElementById('grid');
const backdrop = document.getElementById('backdrop');
const panel = document.getElementById('panel');
const panelClose = document.getElementById('panelClose');
const panelEyebrow = document.getElementById('panelEyebrow');
const panelTitle = document.getElementById('panelTitle');
const panelIntro = document.getElementById('panelIntro');
const panelBody = document.getElementById('panelBody');

// Count total tickers
let totalTickers = 0;
themes.forEach(t => t.groups.forEach(g => totalTickers += g.tickers.length));

document.getElementById('themeCount').textContent = String(themes.length).padStart(2, '0');
document.getElementById('tickerCount').textContent = totalTickers;

themes.forEach((t, i) => {
  const n = t.groups.reduce((s, g) => s + g.tickers.length, 0);
  const btn = document.createElement('button');
  btn.className = 'theme-btn';
  btn.style.animationDelay = `${0.04 * i}s`;
  btn.dataset.key = t.key;
  btn.innerHTML = `
    <div class="theme-arrow">↗</div>
    <div>
      <div class="theme-num">Theme / ${String(i + 1).padStart(2, '0')}</div>
      <div class="theme-name">${t.name}<span class="zh">${t.zh}</span></div>
    </div>
    <div>
      <div class="theme-tagline">${t.tagline}</div>
      <div class="theme-meta">
        <span class="theme-count">${t.groups.length} 子类 · ${n} 标的</span>
        <span>VIEW →</span>
      </div>
    </div>
  `;
  btn.addEventListener('click', () => openTheme(t, i, btn));
  grid.appendChild(btn);
});

function openTheme(theme, index, btn) {
  document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  panelEyebrow.textContent = `Theme / ${String(index + 1).padStart(2, '0')} · ${theme.tagline}`;
  panelTitle.textContent = `${theme.name} · ${theme.zh}`;
  panelIntro.textContent = theme.intro;
  panelBody.innerHTML = theme.groups.map(g => `
    <div class="category">
      <div class="category-name">${g.en}</div>
      <div class="category-zh">${g.zh}</div>
      <div class="tickers">
        ${g.tickers.map(([sym, name, desc]) => `
          <div class="ticker">
            <span class="ticker-sym">$${sym}</span>
            <div class="ticker-body">
              <span class="ticker-name">${name}</span>
              <span class="ticker-desc">${desc}</span>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
  backdrop.classList.add('open');
  panel.classList.add('open');
  document.body.style.overflow = 'hidden';
  panelBody.scrollTop = 0;
}

function closePanel() {
  backdrop.classList.remove('open');
  panel.classList.remove('open');
  document.body.style.overflow = '';
  document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
}

panelClose.addEventListener('click', closePanel);
backdrop.addEventListener('click', closePanel);
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closePanel();
});
</script>
